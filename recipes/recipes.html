<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>RecipeBook | Apple Crisp</title>
  <meta name="description" content="RecipeBook - find delicious, simple recipes like this warm apple crisp served with vanilla ice cream.">

  <!-- Open Graph (Facebook, LinkedIn, etc.) -->
  <meta property="og:type" content="website">
  <meta property="og:title" content="RecipeBook | Apple Crisp">
  <meta property="og:description" content="This apple crisp recipe is a simple yet delicious fall dessert that's great served warm with vanilla ice cream.">
  <meta property="og:url" content="https://example.com/">
  <meta property="og:image" content="images/social-preview.png">

  <!-- X Card -->
  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:title" content="RecipeBook | Apple Crisp">
  <meta name="twitter:description" content="This apple crisp recipe is a simple yet delicious fall dessert that's great served warm with vanilla ice cream.">
  <meta name="twitter:image" content="images/social-preview.png">

  <!-- One favicon (ICO works everywhere) -->
  <link rel="icon" href="/favicon.ico">

  <!-- One Apple Touch Icon (iOS home screen) -->
  <link rel="apple-touch-icon" href="images/apple-touch-icon.png">

  <!-- Google Font -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Amatic+SC:wght@400;700&display=swap" rel="stylesheet">
   <script src="recipes.js" defer></script>

  <link rel="stylesheet" href="recipes.css">
</head>
<body>

  <header class="site-header">
    <div class="branding">
      <img src="images/recipe-book.png" alt="RecipeBook logo" class="logo">
      <h1>RecipeBook</h1>
    </div>

    <form class="search-form" role="search">
      <label for="recipe-search" class="visually-hidden">Find a recipe</label>
      <input type="search" id="recipe-search" name="recipe-search" placeholder="Find a recipe">
      <button type="submit" aria-label="Search">
        <img src="images/search.svg" alt="" class="icon-search">
      </button>
    </form>
  </header>

  <main>
    <article class="recipe-card">
      <img src="images/apple-crisp.jpg" alt="Bowl of apple crisp topped with a scoop of vanilla ice cream" class="recipe-image">

      <div class="recipe-info">
        <span class="tag">dessert</span>
        <h2 class="recipe-title">Apple Crisp</h2>

        <span
          class="rating"
          role="img"
          aria-label="Rating: 4 out of 5 stars"
        >
          <span aria-hidden="true" class="icon-star">⭐</span>
          <span aria-hidden="true" class="icon-star">⭐</span>
          <span aria-hidden="true" class="icon-star">⭐</span>
          <span aria-hidden="true" class="icon-star">⭐</span>
          <span aria-hidden="true" class="icon-star-empty">☆</span>
        </span>

        <p class="recipe-description">
          This apple crisp recipe is a simple yet delicious fall dessert that's great served warm with vanilla ice cream.
        </p>
      </div>
    </article>
  </main>

  <footer class="site-footer">
    <p class="attribution">
      <a href="https://www.flaticon.com/free-icons/recipe" title="recipe icons">Recipe icons created by Freepik - Flaticon</a>
    </p>

    <div class="social">
      <!-- Social media icons provided under CC from https://www.iconfinder.com/AlfredoCreates -->
      <a href="#"><img src="images/instagram_icon.svg" alt="instagram icon"></a>
      <a href="#"><img src="images/youtube_icon.svg" alt="youtube icon"></a>
      <a href="#"><img src="images/pinterest_icon.svg" alt="pinterest icon"></a>
    </div>
  </footer>

 
</body>
</html>
