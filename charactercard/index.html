<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Snortleblat - Character Card</title>

  <!-- Open Graph (Facebook, LinkedIn, etc.) -->
  <meta property="og:type" content="website">
  <meta property="og:title" content="Snortleblat - Character Card">
  <meta property="og:description" content="Meet Snortleblat, the Swamp Beast Diplomat. Level 5 warrior of the murky depths.">
  <meta property="og:url" content="https://yourURLofPage.here">
  <meta property="og:image" content="https://yourURLofSocialPreviewImageHere.png">

  <!-- Twitter Card -->
  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:title" content="Snortleblat - Character Card">
  <meta name="twitter:description" content="Meet Snortleblat, the Swamp Beast Diplomat. Level 5 warrior of the murky depths.">
  <meta name="twitter:image" content="https://yourURLofSocialPreviewImageHere.png">

  <!-- Favicon -->
  <link rel="icon" href="/favicon.ico">
  <link rel="apple-touch-icon" href="/images/apple-touch-icon.png">

  <link rel="stylesheet" href="card.css">
  <script src="card.js"></script>
</head>
<body>

  <div class="card">
    <img class="image" src="snortleblat.webp" alt="Snortleblat the Swamp Beast Diplomat">
    <div class="name" id="charName"></div>
    <div class="stats">
      <p><strong>Class:</strong> <span id="charClass"></span></p>
      <p><strong>Level:</strong> <span id="charLevel"></span></p>
      <p><strong>Health:</strong> <span id="charHealth"></span></p>
    </div>
    <div class="buttons">
      <button onclick="character.attacked()">Attacked</button>
      <button onclick="character.levelUp()">Level Up</button>
    </div>
  </div>

  
</body>
</html>
